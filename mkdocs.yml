      - Overview: index.md
  - Installation:
      - Install: install.md
  - Getting Started:
      - Quick Start: getting_started/quick_start.md
  - Workflow:
      - Data Format: workflow/data_format.md
      - Index: workflow/index.md
      - Retrieval and QA: workflow/retrieval_and_qa.md
      - Training: workflow/training.md
  - Experiment:
      - Overview: experiment/overview.md
      - GFM-RAG Reproduction: experiment/gfm_rag.md
      - G-reasoner Reproduction: experiment/g_reasoner.md
  - Config:
      - Overview: config/index.md
      - Shared Components:
          - Graph Constructor Config: config/graph_constructor_config.md
          - SFT Constructor Config: config/sft_constructor_config.md
          - NER Model Config: config/ner_model_config.md
          - Entity Linking Model Config: config/el_model_config.md
          - OpenIE Model Config: config/openie_model_config.md
          - Document Ranker Config: config/doc_ranker_config.md
          - Text Embedding Config: config/text_embedding_config.md
          - Wandb Config: config/wandb_config.md
      - GFM-RAG:
          - Overview: config/gfm_rag_config.md
          - Graph Index: config/gfm_rag_graph_index_config.md
          - Retrieval and QA: config/gfmrag_retriever_config.md
          - KGC Training: config/gfmrag_pretrain_config.md
          - SFT Training: config/gfmrag_finetune_config.md
      - G-reasoner:
          - Overview: config/g_reasoner_config.md
          - Graph Index: config/g_reasoner_graph_index_config.md
          - Retrieval and QA: config/g_reasoner_retrieval_config.md
          - SFT Training: config/g_reasoner_sft_config.md
  - API Reference:
      - Graph Indexer: api/graph_indexer.md
      - Datasets: api/datasets.md
      - GFM Retriever: api/gfmrag_retriever.md
      - Graph Foundation Models: api/models.md
      - Large Language Models: api/llms.md
      - Text Embedding Models: api/text_emb_models.md
      - Loss Functions: api/losses.md
      - Prompt Builder: api/prompt_builder.md
      - Evaluator: api/evaluator.md
      - Graph Index Construction:
          - Graph Constructor: api/graph_construction/graph_constructor.md
          - SFT Constructor: api/graph_construction/sft_constructor.md
          - NER Model: api/graph_construction/ner_model.md
          - Entity Linking Model: api/graph_construction/el_model.md
          - OpenIE Model: api/graph_construction/openie_model.md
  - Development:
      - Development: DEVELOPING.md
      - Changelog: CHANGELOG.md
repo_url: https://github.com/RManLuo/gfm-rag
repo_name: gfm-rag

plugins:
  - search # 内置插件，在标题中添加了一个搜索栏，允许用户搜索您的文档
  - autorefs
  - same-dir
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_symbol_type_heading: true
            show_source: true
            show_root_toc_entry: false
          import:
            - url: https://docs.python.org/3/objects.inv
              domains: [std, py]

extra:
  version:
    provider: mike
    alias: true
